# argocd crd
# kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml  --server-side --force-conflicts

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: msa-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/WoojuHwww/application-gitops.git
    targetRevision: main
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true