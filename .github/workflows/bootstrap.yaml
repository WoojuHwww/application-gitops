name: argocd bootstrap

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: checkout github
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::398875891485:role/github-actions-terraform-role
          aws-region: ap-northeast-2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region ap-northeast-2 \
          --name t3-dev-my-cluster

      - name: Setup CRDs
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.0/cert-manager.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.1/deploy/static/provider/aws/deploy.yaml
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml  --server-side --force-conflicts

      # S3 upload용 user 생성을 위한 secret
      - name: Create aws-secret
        env:
          APP_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          APP_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          kubectl create secret generic aws-secret \
            --from-literal=AWS_ACCESS_KEY_ID="${APP_ACCESS_KEY_ID}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${APP_SECRET_ACCESS_KEY}" \
            --from-literal=AWS_REGION=ap-northeast-2 \
            -n soldesk \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create my-app-secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PW: ${{ secrets.DB_PW }}
        run: |
          kubectl create namespace soldesk --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic my-app-secrets \
            --from-literal=DB_HOST="${DB_HOST}" \
            --from-literal=DB_PW="${DB_PW}" \
            -n soldesk \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ArgoCD repo secret
        env:
          GITHUB_USERNAME: ${{ vars.USER_NAME }}
          GITOPS_REPO_URL: https://github.com/${{ vars.REPO }}.git
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: gitops-repo-secret
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          stringData:
            type: git
            url: ${GITOPS_REPO_URL}
            username: ${GITHUB_USERNAME}
            password: ${GH_PAT}
          EOF

      - name: Apply root-app
        run: |
          kubectl apply -f argocd/root-app.yaml
